apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ .Release.Name }}-deployment

spec:
  replicas: {{ .Values.replicaCount }}

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: courseapp

  template:
    metadata:
      labels:
        app: courseapp

    spec:
      containers:
        - name: courseapp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - containerPort: 8000

          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config

          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000 