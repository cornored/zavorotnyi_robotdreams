apiVersion: apps/v1
kind: Deployment
metadata:
  name: courseapp-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: courseapp
  template:
    metadata:
      labels:
        app: courseapp
    spec:
      containers:
        - name: courseapp
          image: ashomni/course-app:v1.0
          ports:
            - containerPort: 8000